// ── MENU ──
function toggleMenu(id, parentEl) {
  const sub = document.getElementById('sub-' + id);
  const arrow = document.getElementById('arrow-' + id);
  if (!sub) return;
  const isOpen = sub.classList.contains('open');
  document.querySelectorAll('.nav-sub').forEach(s => s.classList.remove('open'));
  document.querySelectorAll('.nav-arrow').forEach(a => a.classList.remove('open'));
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  if (!isOpen) { sub.classList.add('open'); if (arrow) arrow.classList.add('open'); parentEl.classList.add('active'); }
}
function setNavActive(el) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.querySelectorAll('.nav-sub').forEach(s => s.classList.remove('open'));
  document.querySelectorAll('.nav-arrow').forEach(a => a.classList.remove('open'));
  el.classList.add('active');
}

function setSubActive(el) {
  document.querySelectorAll('.nav-sub-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
}

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.querySelector('.sidebar-overlay').classList.toggle('show');
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.closest('.tab-group').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.closest('.tab-group').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});


// ── SIDEBAR
 fetch('sidebar.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('sidebar-container').innerHTML = html;

      // Marcar automáticamente el item activo según la página actual
      const pagina = window.location.pathname.split('/').pop();
      document.querySelectorAll('.nav-sub-item a').forEach(a => {
        if (a.getAttribute('href') === pagina) {
          a.closest('.nav-sub-item').classList.add('active');

          // Abrir el submenu padre automáticamente
          const sub = a.closest('.nav-sub');
          if (sub) {
            sub.classList.add('open');
            const id = sub.id.replace('sub-', '');
            const arrow = document.getElementById('arrow-' + id);
            if (arrow) arrow.classList.add('open');
            const parentItem = sub.previousElementSibling;
            if (parentItem) parentItem.classList.add('active');
          }
        }
      });
      document.body.style.visibility = 'visible';
    });

function toggleTheme() {
  const isDark = document.body.classList.toggle("dark-mode");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  document.getElementById("iconSun").style.display  = isDark ? "block" : "none";
  document.getElementById("iconMoon").style.display = isDark ? "none"  : "block";
}
(function() {
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
    const s=document.getElementById("iconSun"), m=document.getElementById("iconMoon");
    if(s) s.style.display="block";
    if(m) m.style.display="none";
  }
})();

function renderTeamKPIs() {
  let partidos = [];
  try { partidos = JSON.parse(localStorage.getItem("partidos")) || []; } catch{}
  
  const liga1 = partidos.filter(p =>
    p.liga === "La Liga Division II" && 
    p.estado?.toLowerCase() === "finalizado"
  );
  
  let sg=0, sp=0, wins=0, draws=0, losses=0;
  liga1.forEach(p => {
    if (!p.resultado?.includes("-")) return;
    const [r1,r2] = p.resultado.split("-").map(Number);
    const eL = p.equipo1?.toLowerCase() === "universitario";
    const gU = eL?r1:r2, gR = eL?r2:r1;
    sg+=gU; sp+=gR;
    if (gU>gR) wins++; else if (gU===gR) draws++; else losses++;
  });
  
  const pj = wins+draws+losses;
  const pct = pj>0 ? Math.round(wins/pj*100) : 0;
  
  const cron = [...liga1].sort((a,b) => new Date(b.fecha)-new Date(a.fecha));
  let rChar="—", rLen=0;
  if (cron.length) {
    const u = cron[0];
    const [r1,r2] = u.resultado.split("-").map(Number);
    const eL = u.equipo1?.toLowerCase() === "universitario";
    rChar = (eL?r1:r2)>(eL?r2:r1) ? "V" : (eL?r1:r2)===(eL?r2:r1) ? "E" : "D";
    for (let i=0; i<cron.length; i++) {
      const p = cron[i];
      if (!p.resultado?.includes("-")) break;
      const [a,b] = p.resultado.split("-").map(Number);
      const eL2 = p.equipo1?.toLowerCase() === "universitario";
      const c = (eL2?a:b)>(eL2?b:a) ? "V" : (eL2?a:b)===(eL2?b:a) ? "E" : "D";
      if (c===rChar) rLen++; else break;
    }
  }
  
  const $ = (id,v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
  $("kpi-gf", sg);
  $("kpi-gc", sp);
  $("kpi-win", pct+"%");
  $("kpi-racha", rLen ? rChar+" ×"+rLen : "—");
  $("kpi-gf-sub", "En "+pj+" partidos");
  
  const gcS = document.getElementById("kpi-gc-sub");
  if(gcS) {
    gcS.textContent = sg>=sp ? "Saldo +"+(sg-sp) : "Saldo "+(sg-sp);
    gcS.className = "stat-badge "+(sg>=sp?"up":"down");
  }
  $("kpi-win-sub", wins+"V  "+draws+"E  "+losses+"D");
  
  const rS = document.getElementById("kpi-racha-sub");
  if(rS) {
    const c = rChar==="V"?"#10b981" : rChar==="D"?"#ef4444" : "#94a3b8";
    rS.textContent = rChar==="V" ? "Racha ganadora 🔥" : rChar==="D" ? "Racha perdedora" : "En empates";
    rS.style.background = c+"22";
    rS.style.color = c;
  }
}




const SUPABASE_URL = "https://xwiltuxkdkvbzawcejwe.supabase.co";
const SUPABASE_KEY = "sb_publishable_vzu0ZJiMUxyN53l5lQzS-A_ScHmoJ1o";

async function inicializarPartidos() {
  try {
    const dataLocal = JSON.parse(localStorage.getItem("partidos")) || [];
    
    // Si ya hay datos en localStorage, no pisar con Supabase
    if (dataLocal.length > 0) {
      console.log(`✅ ${dataLocal.length} partidos desde localStorage`);
      return;
    }

    // Solo cargar de Supabase si localStorage está vacío
    const res = await fetch(`${SUPABASE_URL}/rest/v1/partidos?select=*&order=fecha.asc`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`
      }
    });
    if (!res.ok) throw new Error("Error Supabase");
    const data = await res.json();
    localStorage.setItem("partidos", JSON.stringify(data));
    console.log(`✅ ${data.length} partidos cargados desde Supabase`);
  } catch (e) {
    console.error("❌ Error Supabase:", e);
  }
}

function cargarUltimos4Cards() {
  let partidos = JSON.parse(localStorage.getItem("partidos")) || [];

  // Todos los pendientes con fecha, de cualquier liga
let pendientes = partidos.filter(p =>
  (p.estado?.toLowerCase() === "pendiente" || p.estado?.toLowerCase() === "en vivo") &&
  p.fecha && p.fecha.trim() !== ""
);

  // Ordenar por fecha más próxima primero
  pendientes.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
  
  // Solo los que son hoy o después
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  
const proximos = pendientes
  .filter(p => {
    const [y, m, d] = p.fecha.split("-").map(Number);
    const fechaPartido = new Date(y, m - 1, d); // sin UTC, fecha local
    return fechaPartido >= hoy;
  })
  .slice(0, 4);

  const cont = document.getElementById("ultimos4Cards");
  if (!cont) return;
  cont.innerHTML = "";

  if (!proximos.length) {
    cont.innerHTML = `<div style="grid-column:1/-1;text-align:center;font-size:12px;color:var(--text-muted);padding:20px 0;">Sin partidos pendientes próximos</div>`;
    return;
  }



proximos.forEach(p => {
  const ligaLogo = getLigaLogo(p.liga);
  const enVivo = p.estado?.toLowerCase() === "en vivo";
  const card = document.createElement("div");
 card.style.cssText = `
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 0;
  box-shadow: var(--shadow);
`;

  card.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:12px;">
      <img src="img/ligas/${ligaLogo}" style="width:22px;height:22px;object-fit:contain;" title="${p.liga}">
      ${enVivo
        ? `<span class="live-badge"><span class="live-dot"></span>EN VIVO</span>`
        : `<span style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);">Próximo Partido</span>`}
      <div style="width:18px;"></div>
    </div>

    ${enVivo
      ? `<div class="live-minute">${p.minuto ? p.minuto + "'" : "EN VIVO"}</div>`
      : `<div style="text-align:center;font-size:11px;font-weight:500;color:var(--text-muted);background:var(--bg);border-radius:6px;padding:4px 0;margin-bottom:14px;">${p.fecha}${p.hora ? " · " + p.hora : ""}</div>`}

    <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:14px;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <img src="img/${p.logo1}" style="width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.12));" onerror="this.style.display='none'">
        <span style="font-size:12px;font-weight:600;color:var(--text-primary);text-align:center;line-height:1.3;">${p.equipo1}</span>
      </div>
      ${enVivo
        ? `<div class="live-score">${p.resultado || "0 - 0"}</div>`

      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">

  cont.appendChild(card);

let calFecha = new Date();

function cambiarMes(delta) {
  calFecha.setMonth(calFecha.getMonth() + delta);
  renderCalendario();
}

function renderCalendario() {
  const partidos = JSON.parse(localStorage.getItem("partidos")) || [];
  const anio = calFecha.getFullYear();
  const mes  = calFecha.getMonth();

  const nombreMes = calFecha.toLocaleString("es-PE", { month: "long", year: "numeric" });
  document.getElementById("calMesAnio").textContent =

function esUniversitario(nombre) {
  const n = nombre?.trim().toLowerCase();
  return n === "universitario" || n === "universitario ii";
}


function dentroDeVentanaPartido(p) {
  if (!p.hora) return true;
  const [h, m] = p.hora.split(":").map(Number);
  const ahoraStr = new Date().toLocaleString("en-US", {
    timeZone: "America/Lima", hour: "2-digit", minute: "2-digit", hour12: false
  });
  const [hh, mm] = ahoraStr.split(":").map(Number);
  const transcurrido = (hh*60+mm) - (h*60+m);
  const dentro = transcurrido >= -10 && transcurrido <= 100;
  console.log(`[EnVivo] ${p.equipo1} vs ${p.equipo2} | hora partido: ${p.hora} | hora Lima ahora: ${hh}:${String(mm).padStart(2,"0")} | min transcurridos: ${transcurrido} | dentro ventana: ${dentro}`);
  return dentro;
}

function actualizarIndicadorDebug(texto) {
  let el = document.getElementById("debugEnVivo");
  if (!el) {
    el = document.createElement("div");
    el.id = "debugEnVivo";
    el.style.cssText = "position:fixed;bottom:8px;right:8px;background:#000;color:#0f0;font-size:10px;padding:4px 8px;border-radius:6px;z-index:9999;font-family:monospace;opacity:0.85;max-width:90vw;";
    document.body.appendChild(el);
  }
  el.textContent = "🔴 EN VIVO: " + texto;
}






function renderFormaReciente() {
  let partidos = [];
  try { partidos = JSON.parse(localStorage.getItem("partidos")) || []; } catch {}

  const finalizados = partidos.filter(p =>
    (esUniversitario(p.equipo1) || esUniversitario(p.equipo2)) &&
    p.estado?.toLowerCase() === "finalizado" &&
    p.resultado?.includes("-") &&
    p.fecha
  );

  finalizados.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
  const ultimos5 = finalizados.slice(0, 5).reverse(); // del más antiguo al más reciente

  const row = document.getElementById("formaRecienteRow");
  const stats = document.getElementById("formaStats");
  if (!row) return;

  if (!ultimos5.length) {
    row.innerHTML = `<div style="text-align:center;font-size:12px;color:var(--text-muted);width:100%;">Sin partidos recientes</div>`;
    if (stats) stats.innerHTML = "";
    return;
  }

  let g = 0, e = 0, p_ = 0;
  const resultados = [];

  row.innerHTML = ultimos5.map(p => {
    const esLocal = esUniversitario(p.equipo1);
    const rival = esLocal ? p.equipo2 : p.equipo1;
    const logoUni = esLocal ? p.logo1 : p.logo2;
    const logoRival = esLocal ? p.logo2 : p.logo1;
    const [r1, r2] = p.resultado.split("-").map(Number);
    const gU = esLocal ? r1 : r2;
    const gR = esLocal ? r2 : r1;

    let letra, color;
    if (gU > gR)        { letra = "V"; color = "#22C55E"; g++; }
    else if (gU === gR) { letra = "E"; color = "#94A3B8"; e++; }
    else                { letra = "D"; color = "#F43F5E"; p_++; }
    resultados.push(letra);

    const rivalCorto = rival.length > 11 ? rival.slice(0, 10) + "…" : rival;
    const fechaFmt = new Date(p.fecha + "T00:00:00")
      .toLocaleDateString("es-PE", { day: "2-digit", month: "short" });

    return `
      <div class="forma-item">
        <div class="forma-crest-wrap">
          <div class="forma-crest">
            <span class="forma-logo-fallback">${(rival || "?").charAt(0).toUpperCase()}</span>
            <img class="forma-logo" src="img/${logoRival}" onerror="this.style.display='none'">
          </div>
          <span class="forma-badge" style="background:${color};">${letra}</span>
        </div>
        <div class="forma-score" style="color:${color};">${gU}-${gR}</div>
        <div class="forma-rival">${esLocal ? '🏠' : '✈️'} ${rivalCorto}</div>
        <div class="forma-tooltip">
          <div class="forma-tooltip-teams">
            <div class="forma-tooltip-team">
              <img src="img/${logoUni}" onerror="this.style.display='none'">
              <span>Universitario</span>
            </div>
            <div class="forma-tooltip-score" style="color:${color};">${gU} - ${gR}</div>
            <div class="forma-tooltip-team">
              <img src="img/${logoRival}" onerror="this.style.display='none'">
              <span>${rival}</span>
            </div>
          </div>
          <div class="forma-tooltip-meta">${fechaFmt} · ${p.liga}</div>
        </div>
      </div>`;
  }).join("");

  // Racha actual (desde el resultado más reciente hacia atrás)
  let racha = 1;
  for (let i = resultados.length - 1; i > 0; i--) {
    if (resultados[i] === resultados[i - 1]) racha++; else break;
  }
  const ultimaLetra = resultados[resultados.length - 1];
  let rachaTexto, rachaClass;
  if (ultimaLetra === "V")      { rachaTexto = `🔥 Racha de ${racha} victoria${racha>1?'s':''}`; rachaClass = ""; }
  else if (ultimaLetra === "D") { rachaTexto = `📉 ${racha} derrota${racha>1?'s':''} seguida${racha>1?'s':''}`; rachaClass = "loss"; }
  else                            { rachaTexto = `${racha} empate${racha>1?'s':''} seguido${racha>1?'s':''}`; rachaClass = "draw"; }

  if (stats) {
    const total = g + e + p_;
    const gPct = total ? (g/total*100) : 0;
    const ePct = total ? (e/total*100) : 0;
    const pPct = total ? (p_/total*100) : 0;
    stats.innerHTML = `
      <div class="forma-stats-bar">
        <div class="forma-stats-seg win"  style="width:${gPct}%"></div>
        <div class="forma-stats-seg draw" style="width:${ePct}%"></div>
        <div class="forma-stats-seg loss" style="width:${pPct}%"></div>
      </div>
      <div class="forma-stats-labels">
        <span><b style="color:#22C55E">${g}</b> Ganados &nbsp; <b style="color:#94A3B8">${e}</b> Empates &nbsp; <b style="color:#F43F5E">${p_}</b> Perdidos</span>
        ${racha > 1 ? `<span class="forma-streak ${rachaClass}">${rachaTexto}</span>` : ""}
      </div>
    `;
  }
}

const API_FOOTBALL_KEY = "a862b534260c69db07e887b7e21812a7"; // <-- VERIFICA que sea tu clave real, no este placeholder

const NOMBRES_EQUIPOS_EN_ES = {
  "Belgium":"Bélgica","Egypt":"Egipto","Iran":"Irán","New Zealand":"Nueva Zelanda",
  "Spain":"España","Cabo Verde":"Cabo Verde","Saudi Arabia":"Arabia Saudita",
  "Uruguay":"Uruguay","Argentina":"Argentina","Brazil":"Brasil","France":"Francia",
  "Germany":"Alemania","England":"Inglaterra","Mexico":"México","Japan":"Japón",

  "Morocco":"Marruecos","Croatia":"Croacia","Senegal":"Senegal","Canada":"Canadá",
  "Australia":"Australia","Switzerland":"Suiza","Denmark":"Dinamarca","Poland":"Polonia",
  "Serbia":"Serbia","Cameroon":"Camerún","Ecuador":"Ecuador","Tunisia":"Túnez",
  "Ghana":"Ghana","Wales":"Gales","Qatar":"Catar", "Norway": "Noruega","Iraq": "Irak"
};

function mapEstadoAPI(short) {
  if (["1H","HT","2H","ET","BT","P","LIVE","INT"].includes(short)) return "en vivo";
  if (["FT","AET","PEN"].includes(short)) return "finalizado";
  return "pendiente";
}

function minutosTranscurridos(hora) {
  const [h, m] = hora.split(":").map(Number);
  const ahoraStr = new Date().toLocaleString("en-US", { timeZone:"America/Lima", hour:"2-digit", minute:"2-digit", hour12:false });
  const [hh, mm] = ahoraStr.split(":").map(Number);
  return (hh*60+mm) - (h*60+m);
}



async function actualizarPartidosEnVivo() {
  let partidos = JSON.parse(localStorage.getItem("partidos")) || [];
  const hoy = new Date().toLocaleDateString("sv-SE", { timeZone: "America/Lima" });
  const partidosMundialHoy = partidos.filter(p => p.liga === "Copa del Mundo" && p.fecha === hoy);

  // Sin gastar API: si ya pasaron 120+ min y sigue "pendiente", darlo por terminado
  let cambios = false;
  partidosMundialHoy.forEach(p => {
    if (!p.hora) return;
    const t = minutosTranscurridos(p.hora);
    if (p.estado?.toLowerCase() !== "finalizado" && t > 120) {
      p.estado = "finalizado";
      cambios = true;
      console.log(`[EnVivo] ${p.equipo1} vs ${p.equipo2}: t=${t} > 120 -> finalizado (sin consultar API)`);
    }
  });

  console.log(`[EnVivo] === Chequeo ${new Date().toLocaleTimeString("es-PE")} | hoy=${hoy} | partidos Mundial hoy: ${partidosMundialHoy.length}`);
  partidosMundialHoy.forEach(p => console.log(`[EnVivo]   - ${p.equipo1} vs ${p.equipo2} | estado=${p.estado} | hora=${p.hora}`));

  const pendientesHoy = partidosMundialHoy.filter(p =>
    p.estado?.toLowerCase() !== "finalizado" && dentroDeVentanaPartido(p)
  );

  if (!pendientesHoy.length) {
    if (cambios) { localStorage.setItem("partidos", JSON.stringify(partidos)); cargarUltimos4Cards(); renderCalendario(); }
    console.log("[EnVivo] Ningún partido dentro de ventana ahora. No se consulta la API.");
    actualizarIndicadorDebug("sin partidos en ventana (" + new Date().toLocaleTimeString("es-PE") + ")");
    return;
  }

  // ✅ NUEVO: saltar API si ya se consultó hace menos de 5 min
  const ultimaConsulta = parseInt(localStorage.getItem("ultimaConsultaAPI") || "0");
  const minDesdeUltima = (Date.now() - ultimaConsulta) / 60000;
  if (minDesdeUltima < 5) {
    console.log(`[EnVivo] Saltando API — última consulta hace ${minDesdeUltima.toFixed(1)} min`);
    cargarUltimos4Cards();
    return;
  }

  console.log(`[EnVivo] Consultando API para: ${pendientesHoy.map(p=>p.equipo1+' vs '+p.equipo2).join(", ")}`);
  actualizarIndicadorDebug("consultando API...");

  try {
    const res = await fetch("https://v3.football.api-sports.io/fixtures?live=all", {
      headers: { "x-apisports-key": API_FOOTBALL_KEY }
    });
    const data = await res.json();
    console.log("[EnVivo] Respuesta API completa:", data);
    const liveFixtures = data.response || [];

    let encontrados = 0;
    pendientesHoy.forEach(p => {
      const match = liveFixtures.find(f => {
        const home = NOMBRES_EQUIPOS_EN_ES[f.teams.home.name] || f.teams.home.name;
        const away = NOMBRES_EQUIPOS_EN_ES[f.teams.away.name] || f.teams.away.name;
        return (home === p.equipo1 && away === p.equipo2) || (home === p.equipo2 && away === p.equipo1);
      });

      if (!match) {
        if (p.estado === "en vivo") {
          p.estado = "finalizado"; cambios = true;
          console.log(`[EnVivo] ${p.equipo1} vs ${p.equipo2}: ya no está en vivo -> finalizado`);
        } else {
          console.log(`[EnVivo] Sin coincidencia para ${p.equipo1} vs ${p.equipo2}`);
        }
        return;
      }

      encontrados++;
      const nuevoResultado = `${match.goals.home ?? 0} - ${match.goals.away ?? 0}`;
      const nuevoEstado = mapEstadoAPI(match.fixture.status.short);
      const elapsed = match.fixture.status.elapsed;

      p.minutoBase = elapsed;
      p.minutoTimestamp = Date.now();
      p.estadoCorto = match.fixture.status.short;

      console.log(`[EnVivo] -> ${p.equipo1} vs ${p.equipo2} = ${nuevoResultado} (${match.fixture.status.short} / min ${elapsed})`);

      // Detectar gol ANTES de actualizar
      if (p.resultado && p.resultado !== nuevoResultado) {
        mostrarToastGol(p, nuevoResultado, elapsed);
      }

      if (p.resultado !== nuevoResultado || p.estado !== nuevoEstado || p.minuto !== elapsed) {
        p.resultado = nuevoResultado;
        p.estado = nuevoEstado;
        p.minuto = elapsed;
        cambios = true;
      }
    });

    // ✅ NUEVO: guardar timestamp de última consulta exitosa
    localStorage.setItem("ultimaConsultaAPI", Date.now().toString());
    actualizarIndicadorDebug(`${new Date().toLocaleTimeString("es-PE")} · ${encontrados}/${pendientesHoy.length} en vivo`);

    if (cambios) { localStorage.setItem("partidos", JSON.stringify(partidos)); cargarUltimos4Cards(); renderCalendario(); }
  } catch (err) {
    console.error("[EnVivo] Error:", err);
    actualizarIndicadorDebug("ERROR: " + err.message);
  }
}


actualizarPartidosEnVivo();
setInterval(actualizarPartidosEnVivo, 7 * 60 * 1000);



function tickMinutosEnVivo() {
  console.log("[Tick] " + new Date().toLocaleTimeString("es-PE"));
  let partidos = JSON.parse(localStorage.getItem("partidos")) || [];
  let cambios = false;
  partidos.forEach(p => {
    if (p.estado !== "en vivo" || p.minutoBase == null || !p.minutoTimestamp) return;
    if (p.estadoCorto === "HT") return;
    const minsPasados = Math.floor((Date.now() - p.minutoTimestamp) / 60000);
    const minutoVisual = p.minutoBase + minsPasados;
    console.log(`[Tick] ${p.equipo1} vs ${p.equipo2}: minutoBase=${p.minutoBase} + ${minsPasados}min = ${minutoVisual}`);
    if (p.minuto !== minutoVisual) { p.minuto = minutoVisual; cambios = true; }
  });

  if (cambios) { localStorage.setItem("partidos", JSON.stringify(partidos)); cargarUltimos4Cards(); }
}

setInterval(tickMinutosEnVivo, 60 * 1000);




let toastGolTimer = null;

function mostrarToastGol(p, nuevoResultado, minuto) {
  let el = document.getElementById("toastGol");
  if (!el) {
    el = document.createElement("div");
    el.id = "toastGol";
    el.innerHTML = `
      <div class="tg-ball">⚽</div>
      <div style="flex:1;">
        <div class="tg-title">¡Goool!</div>
        <div class="tg-score" id="tgScore"></div>
        <div class="tg-meta" id="tgMeta"></div>
      </div>
      <div class="tg-min" id="tgMin"></div>`;
    document.body.appendChild(el);
  }

  document.getElementById("tgScore").textContent = `${p.equipo1} ${nuevoResultado} ${p.equipo2}`;
  document.getElementById("tgMeta").textContent = `${p.liga} · ${p.estadio || ""}`;
  document.getElementById("tgMin").textContent = minuto ? minuto + "'" : "EN VIVO";

  el.classList.remove("show");
  el.offsetHeight; // fuerza reflow para reiniciar animación
  el.classList.add("show");

  // Flash en la card correspondiente
  document.querySelectorAll("#ultimos4Cards > div").forEach(card => {
    const nombres = card.querySelectorAll("span");
    const textos = [...nombres].map(s => s.textContent.trim());
    if (textos.includes(p.equipo1) || textos.includes(p.equipo2)) {
      card.classList.remove("card-gol-flash");
      card.offsetHeight;
      card.classList.add("card-gol-flash");
      setTimeout(() => card.classList.remove("card-gol-flash"), 900);
    }
  });

  if (toastGolTimer) clearTimeout(toastGolTimer);
  toastGolTimer = setTimeout(() => el.classList.remove("show"), 6000);
}
