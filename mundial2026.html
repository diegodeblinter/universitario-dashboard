<script>
// ── NAV ──
function toggleMenu(id, parentEl) {
  const sub = document.getElementById('sub-' + id);
  const arrow = document.getElementById('arrow-' + id);
  if (!sub) return;
  const isOpen = sub.classList.contains('open');
  document.querySelectorAll('.nav-sub').forEach(s => s.classList.remove('open'));
  document.querySelectorAll('.nav-arrow').forEach(a => a.classList.remove('open'));
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  if (!isOpen) { sub.classList.add('open'); if (arrow) arrow.classList.add('open'); parentEl.classList.add('active'); }
}
function setNavActive(el) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.querySelectorAll('.nav-sub').forEach(s => s.classList.remove('open'));
  document.querySelectorAll('.nav-arrow').forEach(a => a.classList.remove('open'));
  el.classList.add('active');
}
function setSubActive(el) {
  document.querySelectorAll('.nav-sub-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
}
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.querySelector('.sidebar-overlay').classList.toggle('show');
}
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.closest('.tab-group').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ── SIDEBAR
 fetch('sidebar.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('sidebar-container').innerHTML = html;

      // Marcar automáticamente el item activo según la página actual
      const pagina = window.location.pathname.split('/').pop();
      document.querySelectorAll('.nav-sub-item a').forEach(a => {
        if (a.getAttribute('href') === pagina) {
          a.closest('.nav-sub-item').classList.add('active');

          // Abrir el submenu padre automáticamente
          const sub = a.closest('.nav-sub');
          if (sub) {
            sub.classList.add('open');
            const id = sub.id.replace('sub-', '');
            const arrow = document.getElementById('arrow-' + id);
            if (arrow) arrow.classList.add('open');
            const parentItem = sub.previousElementSibling;
            if (parentItem) parentItem.classList.add('active');
          }
        }
      });
      document.body.style.visibility = 'visible';
    });


// ── FILTROS ──
const filtroLiga = document.getElementById("viewSelect");
const filtroAnio = document.getElementById("yearSelect");
const tablaPosiciones = document.getElementById("tablaPosiciones");
const tablaPartidos   = document.getElementById("tablaPartidos");

// ── PAGINACIÓN (estado global) ──
const ROWS_PER_PAGE = 14;
let paginaActual = 1;
let partidosFiltrados = [];  // todos los partidos del filtro actual

// ── DATOS POSICIONES ──
// ── DATOS GRUPOS COPA DEL MUNDO ──

const dotClass = { W:"dot-w", D:"dot-d", L:"dot-l" };

const SUPABASE_URL = "https://xwiltuxkdkvbzawcejwe.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3aWx0dXhrZGt2Ynphd2NlandlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NjIzMDQsImV4cCI6MjA5NzEzODMwNH0.DKuVLQUUObhI_BQ2A-Rxqno0xb9_2xmjOkPFyHyI1io";

async function render() {
  const year = parseInt(document.getElementById("yearSelect").value);
  const view = document.getElementById("viewSelect").value;
  const container = document.getElementById("gruposContainer");
  if (!container) return;
  if (view !== "overview") { container.innerHTML = ""; return; }

  container.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#94a3b8;padding:20px;">Cargando...</div>`;

const res = await fetch(
    `${SUPABASE_URL}/rest/v1/posiciones?liga=eq.${encodeURIComponent('Copa del Mundo')}&temporada=eq.${year}&select=*&order=grupo.asc`,
    { headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } }
  );
  const data = await res.json();
console.log("Supabase data:", data);


  // Agrupar por grupo
  const grupos = {};
  data.forEach(r => {
    if (!grupos[r.grupo]) grupos[r.grupo] = [];
    grupos[r.grupo].push(r);
  });

  container.innerHTML = "";

  Object.keys(grupos).sort().forEach(letra => {
    const rows = [...grupos[letra]].sort((a, b) => {
      const pa = a.g*3+a.e, pb = b.g*3+b.e;
      if (pb !== pa) return pb - pa;
      const da = a.gf-a.gc, db = b.gf-b.gc;
      if (db !== da) return db - da;
      return b.gf - a.gf;
    });

    const dotClass = { W:"dot-w", D:"dot-d", L:"dot-l" };

    const filasHTML = rows.map((t, i) => {
      const pts = t.g*3+t.e;
      const dg = t.gf-t.gc;
      const dgStr = dg>0?"+"+dg:String(dg);
      const dgClass = dg>0?"dg-pos":dg<0?"dg-neg":"dg-zer";
const last5 = t.forma
  ? t.forma.split("").slice(-5).map(r =>
      `<div class="dot ${dotClass[r]||'dot-d'}" style="width:10px;height:10px;"></div>`
    ).join("")
  : "";
      const barColor = (t.zona === "clasificado") ? "#3b82f6" : "#e2e8f0";

      return `
        <tr style="border-bottom:1px solid var(--border);">
          <td style="padding:0;width:3px;">
            <div style="width:3px;height:100%;min-height:36px;background:${barColor};border-radius:2px;"></div>
          </td>
          <td style="text-align:center;font-size:11px;font-weight:600;padding:6px 3px;color:var(--text-muted);">${i+1}</td>
          <td style="padding:6px 4px;">
            <div style="display:flex;align-items:center;gap:5px;">
              <img src="img/${t.logo}" style="width:18px;height:18px;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">
              <span style="font-size:11px;font-weight:600;color:var(--text-primary);">${t.equipo}</span>
            </div>
          </td>
          <td style="text-align:center;font-size:11px;color:var(--text-secondary);padding:6px 3px;">${t.pj}</td>
          <td style="text-align:center;font-size:11px;color:var(--text-secondary);padding:6px 3px;">${t.g}</td>
          <td style="text-align:center;font-size:11px;color:var(--text-secondary);padding:6px 3px;">${t.e}</td>
          <td style="text-align:center;font-size:11px;color:var(--text-secondary);padding:6px 3px;">${t.p}</td>
          <td style="text-align:center;font-size:11px;color:var(--text-secondary);padding:6px 3px;">${t.gf}</td>
          <td style="text-align:center;font-size:11px;color:var(--text-secondary);padding:6px 3px;">${t.gc}</td>
          <td style="text-align:center;font-size:11px;padding:6px 3px;" class="${dgClass}">${dgStr}</td>
          <td style="text-align:center;padding:6px 3px;"><span class="pts-val" style="font-size:11px;">${pts}</span></td>
          <td style="padding:6px 3px;"><div class="last5" style="justify-content:center;gap:2px;">${last5}</div></td>
        </tr>`;
    }).join("");

    container.insertAdjacentHTML("beforeend", `
      <div class="grupo-block">
        <div class="grupo-header-label">Grupo ${letra}</div>
        <div style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="border-bottom:1px solid var(--border);">
                <th style="width:3px;padding:0;"></th>
                <th style="width:20px;text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 3px;">POS</th>
                <th style="text-align:left;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 4px;">EQUIPO</th>
                <th style="text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 3px;width:26px;">PJ</th>
                <th style="text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 3px;width:22px;">G</th>
                <th style="text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 3px;width:22px;">E</th>
                <th style="text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 3px;width:22px;">P</th>
                <th style="text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 3px;width:26px;">GF</th>
                <th style="text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 3px;width:26px;">GC</th>
                <th style="text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 3px;width:30px;">DG</th>
                <th style="text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 3px;width:28px;">PTS</th>
                <th style="text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 3px;width:60px;">ÚLT.5</th>
              </tr>
            </thead>
            <tbody>${filasHTML}</tbody>
          </table>
        </div>
      </div>`);
  });
}



// ══════════════════════════════════════
// TABLA DE PARTIDOS + PAGINACIÓN
// ══════════════════════════════════════

function getLigaLogo(nombreLiga) {
  const mapa = {
    "Liga 1":"liga1.png","Copa Libertadores":"libertadores.png",
    "Copa Sudamericana":"sudamericana.png","Liga Femenina FPF":"ligafemenina.png",
    "Amistosos":"amistosos.png","Torneo de Reservas":"reservas.png",
    "Copa Libertadores sub20":"libertadoressub20.png","Liga 3":"liga3.png",
    "Liga Futsal Pro":"futsalpro.png","Copa Libertadores Futsal":"libertadoresfutsal.png",
    "Liga Voley":"voley.png",
    "Copa del Mundo" : "eliminatoria2026.png"
  };
  return mapa[nombreLiga]||"defaultliga.png";
}

function cargarPartidos() {
  const json = localStorage.getItem("partidos");
  if (!json) return [];
  try { return JSON.parse(json); } catch { return []; }
}

/* Renderiza la página actual de partidosFiltrados */
function renderPaginaPartidos() {
  const tbody = document.getElementById("tbodyPartidos");
  tbody.innerHTML = "";

  const total    = partidosFiltrados.length;
  const totalPag = Math.ceil(total / ROWS_PER_PAGE) || 1;
  if (paginaActual > totalPag) paginaActual = totalPag;

  const desde = (paginaActual - 1) * ROWS_PER_PAGE;
  const hasta = Math.min(desde + ROWS_PER_PAGE, total);
  const pagina = partidosFiltrados.slice(desde, hasta);

  if (total === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:#94a3b8;">Seleccione una liga para ver los partidos.</td></tr>';
  } else {
    pagina.forEach(p => {
      const tieneResultado = p.resultado && p.resultado.trim() !== "" && p.resultado.trim() !== "vs";
      const scoreHtml = tieneResultado
        ? `<div class="tp-score">${p.resultado}</div>`
        : `<div class="tp-score pendiente">.  vs  .</div>`;
      const estadoNorm = (p.estado||"").toLowerCase();
      let pillClass = "";
      if (estadoNorm.includes("vivo")||estadoNorm.includes("live")) pillClass="live";
      else if (estadoNorm.includes("pend")||estadoNorm.includes("prox")||estadoNorm.includes("próx")) pillClass="pendiente";
      else if (estadoNorm.includes("susp")) pillClass="suspendido";
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="tp-fecha">${p.fecha}</td>
        <td class="tp-liga-col"><div class="tp-liga-wrap"><img src="img/ligas/${getLigaLogo(p.liga)}" alt="${p.liga}"></div></td>
        <td><div class="tp-liga-info"><span class="tp-liga-nombre">${p.detalle}</span><span class="tp-liga-estadio">${p.estadio}</span></div></td>
        <td><div class="tp-equipos">
          <div class="tp-local"><img src="img/${p.logo1}" alt="${p.equipo1}"><span>${p.equipo1}</span></div>
          ${scoreHtml}
          <div class="tp-visita"><span>${p.equipo2}</span><img src="img/${p.logo2}" alt="${p.equipo2}"></div>
        </div></td>
        <td class="tp-estado"><span class="tp-pill ${pillClass}">${p.estado}</span></td>`;
      tbody.appendChild(tr);
    });
  }

  // Actualizar info de paginación
  document.getElementById("pgFrom").textContent  = total === 0 ? 0 : desde + 1;
  document.getElementById("pgTo").textContent    = hasta;
  document.getElementById("pgTotal").textContent = total;

  // Botones prev / next
  document.getElementById("btnPrev").disabled = paginaActual <= 1;
  document.getElementById("btnNext").disabled = paginaActual >= totalPag;

  // Números de página
  renderNumeroPaginas(totalPag);
}

function renderNumeroPaginas(totalPag) {
  const container = document.getElementById("pageNumbers");
  container.innerHTML = "";

  if (totalPag <= 1) return;  // no mostrar si solo hay 1 página

  const crearBtn = (num) => {
    const btn = document.createElement("button");
    btn.className = "page-btn" + (num === paginaActual ? " active" : "");
    btn.textContent = num;
    btn.onclick = () => { paginaActual = num; renderPaginaPartidos(); };
    return btn;
  };

  const crearEllipsis = () => {
    const span = document.createElement("span");
    span.className = "page-ellipsis";
    span.textContent = "…";
    return span;
  };

  // Mostrar máximo 7 botones con ellipsis
  if (totalPag <= 7) {
    for (let i = 1; i <= totalPag; i++) container.appendChild(crearBtn(i));
  } else {
    container.appendChild(crearBtn(1));
    if (paginaActual > 3) container.appendChild(crearEllipsis());
    const start = Math.max(2, paginaActual - 1);
    const end   = Math.min(totalPag - 1, paginaActual + 1);
    for (let i = start; i <= end; i++) container.appendChild(crearBtn(i));
    if (paginaActual < totalPag - 2) container.appendChild(crearEllipsis());
    container.appendChild(crearBtn(totalPag));
  }
}

function cambiarPagina(delta) {
  const totalPag = Math.ceil(partidosFiltrados.length / ROWS_PER_PAGE) || 1;
  paginaActual = Math.max(1, Math.min(paginaActual + delta, totalPag));
  renderPaginaPartidos();
}

function actualizarPartidos() {
  const liga = filtroLiga.value;
  const anio = filtroAnio.value;

  if (!liga || liga === "overview") {
    partidosFiltrados = [];
    paginaActual = 1;
    renderPaginaPartidos();
    return;
  }

  const todos = cargarPartidos();
  partidosFiltrados = todos.filter(p =>
    p.genero === "Mundial" &&
    p.liga === liga &&
    p.fecha.startsWith(anio)
  );
  paginaActual = 1;  // siempre empezar desde la página 1 al cambiar filtro
  renderPaginaPartidos();
}

function actualizarTablas() {
  const liga = filtroLiga.value;
  if (liga === "overview") {
    tablaPosiciones.style.display = "block";
    tablaPartidos.style.display   = "none";
    document.getElementById("tablaPlayoff").style.display = "none";
    render();
  } else if (liga === "Play-Off") {               // ← nuevo
    tablaPosiciones.style.display = "none";
    tablaPartidos.style.display   = "none";
    document.getElementById("tablaPlayoff").style.display = "block";
    buildBracket();
  } else {
    tablaPosiciones.style.display = "none";
    tablaPartidos.style.display   = "block";
    document.getElementById("tablaPlayoff").style.display = "none";
    actualizarPartidos();
  }
}

function cargarFormaReciente() {
  let partidos = JSON.parse(localStorage.getItem("partidos"))||[];
  partidos = partidos.filter(p =>
    p.liga === "Copa Libertadores F" &&
    (p.equipo1.toLowerCase() === "universitario" || p.equipo2.toLowerCase() === "universitario") &&
    p.resultado && p.estado.toLowerCase() === "finalizado"
  );
  partidos.sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
  const ultimos = partidos.slice(-8);

  const barsEl   = document.getElementById("forma-bars");
  const labelsEl = document.getElementById("forma-labels");
  const badgesEl = document.getElementById("forma-badges");
  const subLabel = document.getElementById("forma-sub-label");

  if (!barsEl || !labelsEl) return;

  barsEl.innerHTML   = "";
  labelsEl.innerHTML = "";
  badgesEl.innerHTML = "";

  if (!ultimos.length) {
    barsEl.innerHTML = `<div style="flex:1;text-align:center;font-size:12px;color:var(--text-muted);padding:20px 0;">Sin partidos registrados</div>`;
    subLabel.textContent = "Sin datos";
    return;
  }

  subLabel.textContent = `Últimos ${ultimos.length} partidos`;

  const colorMap  = { W: "#22C55E", D: "#94A3B8", L: "#F43F5E" };
  const labelMap  = { W: "V",       D: "E",       L: "D"       };
  const heightMap = { W: 110,       D: 60,        L: 28        };

  // Contar para badges
  const counts = { W: 0, D: 0, L: 0 };

  // Datos procesados
  const datos = ultimos.map(p => {
    let golesU, golesR, logoRival, nombreRival, shortRival, colorRival, bgRival;
    const esLocal = p.equipo1.toLowerCase() === "universitario";
    if (esLocal) {
      logoRival   = p.logo2;
      nombreRival = p.equipo2;
      [golesU, golesR] = p.resultado.split("-").map(Number);
    } else {
      logoRival   = p.logo1;
      nombreRival = p.equipo1;
      [golesR, golesU] = p.resultado.split("-").map(Number);
    }
    let result = golesU > golesR ? "W" : golesU < golesR ? "L" : "D";
    counts[result]++;

    // Short name (primeras 2-3 letras)
    shortRival = nombreRival.replace(/^(Sporting|Sport|Alianza|Atlético|Atletico|Deportivo|FC |FBC )/i,"").substring(0,3).toUpperCase();

    return { result, score: p.resultado, logoRival, nombreRival, shortRival };
  });

  // Badges resumen
  [["W","V","#22C55E"], ["D","E","#94A3B8"], ["L","D","#F43F5E"]].forEach(([k, lbl, c]) => {
    const b = document.createElement("div");
    b.className = "forma-badge";
    b.style.cssText = `background:${c}18; border:1px solid ${c}44;`;
    b.innerHTML = `<span class="forma-badge-num" style="color:${c};">${counts[k]}</span><span class="forma-badge-lbl">${lbl}</span>`;
    badgesEl.appendChild(b);
  });

  // Barras + Etiquetas
  datos.forEach(d => {
    const h = heightMap[d.result];
    const c = colorMap[d.result];

    // Columna barra
    const col = document.createElement("div");
    col.className = "forma-bar-col";

    const scoreEl = document.createElement("div");
    scoreEl.className = "forma-bar-score";
    scoreEl.style.color = c;
    scoreEl.textContent = d.score;

    const bar = document.createElement("div");
    bar.className = "forma-bar";
    bar.style.cssText = `height:${h}px; background:${c};`;
    bar.innerHTML = `<span>${labelMap[d.result]}</span>`;

    col.appendChild(scoreEl);
    col.appendChild(bar);
    barsEl.appendChild(col);

    // Columna etiqueta
    const lbl = document.createElement("div");
    lbl.className = "forma-label-col";

    const avatar = document.createElement("div");
    avatar.className = "forma-rival-avatar";
    avatar.style.background = "#F1F5F9";

    // Intentar mostrar imagen, fallback a texto
    const img = document.createElement("img");
    img.src = "img/" + d.logoRival;
    img.style.cssText = "width:16px;height:16px;object-fit:contain;";
    img.onerror = () => {
      avatar.removeChild(img);
      const sp = document.createElement("span");
      sp.textContent = d.shortRival;
      sp.style.cssText = `font-size:7px;font-weight:800;color:#64748b;`;
      avatar.appendChild(sp);
    };
    avatar.appendChild(img);

    const name = document.createElement("p");
    name.className = "forma-rival-name";
    // Nombre corto
    name.textContent = d.nombreRival.replace(/^(Sporting |Sport |Alianza |Atlético |Atletico |Deportivo |FC |FBC )/i,"").substring(0, 8);

    lbl.appendChild(avatar);
    lbl.appendChild(name);
    labelsEl.appendChild(lbl);
  });
}

function cargarUltimosLiga1() {
  let partidos = JSON.parse(localStorage.getItem("partidos"))||[];

  liga1.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const ultimos = liga1.slice(0,5);
  const cont = document.getElementById("ultimosLiga1");
  const streaksCont = document.getElementById("card3-streaks");
  if (!cont) return;
  cont.innerHTML = "";
  if (streaksCont) streaksCont.innerHTML = "";

  const cfgR = {
    W:{ color:"#22C55E", bg:"#F0FDF4", border:"#BBF7D0", label:"V" },
    D:{ color:"#64748B", bg:"#F1F5F9", border:"#CBD5E1", label:"E" },
    L:{ color:"#DC2626", bg:"#FEE2E2", border:"#FECACA", label:"D" },

    cont.innerHTML = `<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:16px 0;">Sin partidos registrados</div>`;
    return;
  }

  // Streak dots (cronológico, más antiguo a izquierda)
  if (streaksCont) {
    [...ultimos].reverse().forEach(p => {
      let r1=0,r2=0;
      if (p.resultado&&p.resultado.includes("-")) [r1,r2]=p.resultado.split("-").map(n=>parseInt(n.trim()));
      let estado="D";
      if (p.equipo1.toLowerCase()==="universitario") { if(r1>r2)estado="W"; else if(r1<r2)estado="L"; }
      else if (p.equipo2.toLowerCase()==="universitario") { if(r2>r1)estado="W"; else if(r2<r1)estado="L"; }

      const d = document.createElement("div");
      d.className = "card3-streak-dot";
      d.style.cssText = `background:${r.bg};border:1px solid ${r.border};color:${r.color};`;
      d.textContent = r.label;
      streaksCont.appendChild(d);
    });
  }

  ultimos.forEach(p => {
    let r1=0,r2=0;
    if (p.resultado&&p.resultado.includes("-")) [r1,r2]=p.resultado.split("-").map(n=>parseInt(n.trim()));
    let estado="D";
    if (p.equipo1.toLowerCase()==="universitario") { if(r1>r2)estado="W"; else if(r1<r2)estado="L"; }
    else if (p.equipo2.toLowerCase()==="universitario") { if(r2>r1)estado="W"; else if(r2<r1)estado="L"; }
    const r = cfgR[estado];
    const localWins = r1 > r2;
    const visitWins = r2 > r1;
    const dateShort = p.fecha ? p.fecha.substring(5).replace("-","/") : "";

    const div = document.createElement("div");
    div.className = "partido-item";
    div.innerHTML = `
      <div class="partido-acento" style="background:${r.color};"></div>
      <div class="partido-fecha">
        <div class="partido-fecha-top">${dateShort}</div>
        <div class="partido-fecha-sub">Final</div>
      </div>
      <div class="partido-sep"></div>
      <div class="partido-equipos">
        <div class="partido-equipo-row">
          <div class="partido-logo-wrap" >
            <img src="img/${p.logo1}" onerror="this.style.display='none'">
          </div>
          <span class="partido-nombre" style="font-weight:${localWins?'700':'400'};color:${localWins?'var(--text-primary)':'var(--text-secondary)'};">${p.equipo1}</span>
          <span class="partido-gol" style="font-weight:${localWins?'800':'400'};color:${localWins?'var(--text-primary)':'var(--text-muted)'};">${r1}</span>
        </div>
        <div class="partido-equipo-row">
          <div class="partido-logo-wrap" >
            <img src="img/${p.logo2}" onerror="this.style.display='none'">
          </div>
          <span class="partido-nombre" style="font-weight:${visitWins?'700':'400'};color:${visitWins?'var(--text-primary)':'var(--text-secondary)'};">${p.equipo2}</span>
          <span class="partido-gol" style="font-weight:${visitWins?'800':'400'};color:${visitWins?'var(--text-primary)':'var(--text-muted)'};">${r2}</span>
        </div>
      </div>
      <div class="partido-badge" style="background:${r.color};">${r.label}</div>`;
    cont.appendChild(div);
  });
}

  if(scoreEl) scoreEl.textContent=tieneRes?p.resultado:"vs";

  if(tieneRes){

    const bL=document.getElementById("barLocal"), bV=document.getElementById("barVisita");
    if(bL) bL.style.width=Math.round(r1/tot*100)+"%";
    if(bV) bV.style.width=Math.round(r2/tot*100)+"%";
    const bLL=document.getElementById("barLocalLbl"), bVL=document.getElementById("barVisitaLbl");
    if(bLL) bLL.textContent=(p.equipo1||"")+" · "+r1;
    if(bVL) bVL.textContent=(p.equipo2||"")+" · "+r2;
  }
  const est=(p.estado||"").toLowerCase();
  let bg="#e2e8f0", col="#475569";
  if(est.includes("vivo")||est.includes("live")){bg="rgba(16,185,129,0.15)";col="#059669";}

  return `<div class="match">
    <div class="match-team ${w1?'winner':''} ${!p.e1?'empty':''}">
      ${logo(p.logo1)}<span class="team-name">${n1}</span>
      <span class="team-score">${played ? p.g1 : ''}</span>
    </div>
    <div class="match-team ${w2?'winner':''} ${!p.e2?'empty':''}">
      ${logo(p.logo2)}<span class="team-name">${n2}</span>
      <span class="team-score">${played ? p.g2 : ''}</span>
    </div>
  </div>`;
}



function buildBracket() {
  const container = document.getElementById("bracketContainer");
  if (!container) return;
  container.innerHTML = "";

  // Calcular ancho disponible del card
  const cardAncho = container.closest(".card")?.clientWidth || 1100;
const CAMPEON_W = 150;
const CONN_W    = 14;
  const NUM_RONDAS = RONDA_KEYS.length; // 5
  const NUM_CONN   = NUM_RONDAS - 1;    // 4
  // Ancho de cada match = espacio disponible dividido entre rondas
  const MATCH_W = Math.floor((cardAncho - CAMPEON_W - NUM_CONN * CONN_W - 70) / NUM_RONDAS);

  const MATCH_H = 68;
  const GAP_16  = 16;
  const total16 = 16;
  const totalH  = total16 * MATCH_H + (total16 - 1) * GAP_16;

  RONDA_KEYS.forEach((key, rIdx) => {
    const matches = BRACKET[key];
    const count   = matches.length;
    const segH    = totalH / count;

    const col = document.createElement("div");
    col.style.cssText = `flex-shrink:0; display:flex; flex-direction:column;`;

    const lbl = document.createElement("div");
    lbl.className = "ronda-label";
    lbl.textContent = RONDA_LABELS[key];
    lbl.style.cssText = `
      height:28px; width:${MATCH_W}px;
      display:flex; align-items:center; justify-content:center;
      font-size:9px; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase; color:var(--text-muted);
    `;
    col.appendChild(lbl);

    const area = document.createElement("div");
    area.style.cssText = `position:relative; width:${MATCH_W}px; height:${totalH}px;`;

    matches.forEach((p, mIdx) => {
      const centerY = segH * mIdx + segH / 2;
      const top     = Math.round(centerY - MATCH_H / 2);
      const mw      = document.createElement("div");
      mw.style.cssText = `position:absolute; top:${top}px; left:0; right:0;`;
      // Pasar MATCH_W al render
      mw.innerHTML = renderMatchBracketW(p, MATCH_W);
      area.appendChild(mw);
    });

    col.appendChild(area);
    container.appendChild(col);

    // Conector SVG
    if (rIdx < RONDA_KEYS.length - 1) {
      const nextCount = BRACKET[RONDA_KEYS[rIdx + 1]].length;
      const segCur    = totalH / count;
      const segNext   = totalH / nextCount;

      const svgWrap = document.createElement("div");
      svgWrap.style.cssText = `flex-shrink:0; display:flex; flex-direction:column;`;

      const sp = document.createElement("div");
      sp.style.height = "28px";
      svgWrap.appendChild(sp);

      const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
      svg.setAttribute("width",  CONN_W);
      svg.setAttribute("height", totalH);
      svg.style.display = "block";

      for (let i = 0; i < count; i += 2) {
        const pi  = Math.floor(i / 2);
        const y1  = segCur  * i       + segCur  / 2;
        const y2  = segCur  * (i + 1) + segCur  / 2;
        const yOut= segNext * pi + segNext / 2;
        const xM  = CONN_W / 2;

        const path = document.createElementNS("http://www.w3.org/2000/svg","path");
        path.setAttribute("d", `
          M 0 ${y1} H ${xM}
          M 0 ${y2} H ${xM}
          M ${xM} ${y1} V ${y2}
          M ${xM} ${yOut} H ${CONN_W}
        `);
        path.setAttribute("fill","none");
        path.setAttribute("stroke","#475569");
        path.setAttribute("stroke-width","1.5");
        path.setAttribute("stroke-linecap","square");
        svg.appendChild(path);
      }

      svgWrap.appendChild(svg);
      container.appendChild(svgWrap);
    }
  });

  // Campeón
  const c = BRACKET.campeon;
  const cWrap = document.createElement("div");
  cWrap.style.cssText = `flex-shrink:0; display:flex; flex-direction:column;`;

  const cSp = document.createElement("div");
  cSp.style.height = "28px";
  cWrap.appendChild(cSp);

  const cInner = document.createElement("div");
  cInner.style.cssText = `
    height:${totalH}px; display:flex; align-items:center; padding:0 16px;
  `;
  cInner.innerHTML = `
    <div style="text-align:center;">
      <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">Campeón</div>
      <div class="campeon-box" style="width:${CAMPEON_W - 32}px;">
        <div class="campeon-trophy">🏆</div>
        ${c.logo ? `<img class="campeon-img" src="img/${c.logo}">` : ''}
        <div class="campeon-nombre">${c.nombre || "Por definir"}</div>
        <div class="campeon-sub">FIFA World Cup 2026</div>
      </div>
    </div>`;
  cWrap.appendChild(cInner);
  container.appendChild(cWrap);
}


function renderMatchBracketW(p, w) {
  const played = p.g1 !== null && p.g2 !== null;
  const w1 = played && p.g1 > p.g2;
  const w2 = played && p.g2 > p.g1;
  const n1 = p.e1 || "Por definir";
  const n2 = p.e2 || "Por definir";
  const logo = (src) => src
    ? `<img src="img/${src}" style="width:22px;height:16px;object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">`
    : `<div style="width:16px;height:16px;border-radius:50%;background:var(--border);flex-shrink:0;"></div>`;
  return `
    <div style="
      background:var(--bg-white,#1c2434);
      border:1px solid var(--border,#2d3748);
      border-radius:7px;
      overflow:hidden;
      width:${w}px;
    ">
      <div style="
        display:flex;align-items:center;gap:6px;padding:6px 8px;
        font-size:11px;font-weight:${w1?700:500};
        color:var(--text-primary,#e2e8f0);
        min-height:34px;border-bottom:1px solid var(--border,#2d3748);
        background:${w1?'rgba(59,130,246,0.1)':'transparent'};
      ">
        ${logo(p.logo1)}
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n1}</span>
        <span style="font-size:11px;font-weight:800;min-width:16px;text-align:right;color:${w1?'#3b82f6':'var(--text-primary)'};">${played ? p.g1 : ''}</span>
      </div>
      <div style="
        display:flex;align-items:center;gap:6px;padding:6px 8px;
        font-size:11px;font-weight:${w2?700:500};
        color:var(--text-primary,#e2e8f0);
        min-height:34px;
        background:${w2?'rgba(59,130,246,0.1)':'transparent'};
      ">
        ${logo(p.logo2)}
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n2}</span>
        <span style="font-size:11px;font-weight:800;min-width:16px;text-align:right;color:${w2?'#3b82f6':'var(--text-primary)'};">${played ? p.g2 : ''}</span>
      </div>
    </div>`;
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

</script>
